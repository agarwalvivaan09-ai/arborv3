<!DOCTYPE html>
<html>
<head>
    <title>Arbor Quant Engine v3</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header class="main-header">
    <div class="header-left">
        <div>Arbor Quant Engine v3</div>
    </div>

    <div class="header-right">
        <button onclick="window.location.href='dashboard.html'" class="header-link">
            ← Dashboard
        </button>
        <button id="logoutBtnHeader" class="header-logout">
            Sign Out
        </button>
    </div>
</header>

<div class="container">

<div class="card">
    <h2>Capital Structure</h2>
    <div id="capitalOverview"></div>
</div>

<div class="card">
    <h2>Portfolio Allocation</h2>
    <div id="portfolioSection">

    <label>Equity Weight (%)</label>
    <input type="number" id="equityWeight" value="50">

    <label>Fixed Income Weight (%)</label>
    <input type="number" id="bondWeight" value="20">

    <label>Real Estate Weight (%)</label>
    <input type="number" id="realEstateWeight" value="20">

    <label>Cash Weight (%)</label>
    <input type="number" id="cashWeight" value="10">

    <button id="calculatePortfolioBtn">Calculate Portfolio Metrics</button>

    <div style="margin-top:20px;">
        Expected Return: <span id="portfolioReturn"></span><br>
        Portfolio Volatility: <span id="portfolioVol"></span><br>
        Sharpe Ratio: <span id="portfolioSharpe"></span>
    </div>

</div>
</div>

<div class="card">
    <h2>Macro Regime</h2>
    <div id="macroSection"></div>
</div>

<div class="card">
    <h2>Advanced Monte Carlo (Quant)</h2>
    <div class="metrics">
        <div class="metric">
            <span>Growth Probability</span>
            <strong id="v3Growth"></strong>
        </div>
        <div class="metric">
            <span>Decline Probability</span>
            <strong id="v3Decline"></strong>
        </div>
        <div class="metric">
            <span>Insolvency Probability</span>
            <strong id="v3Insolvency"></strong>
        </div>
    </div>

    <canvas id="v3Chart" height="250"></canvas>
</div>

</div>

<script type="module" src="v3-engine.js"></script>

</body>
</html>
